<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clarity Engine UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Clarity Engine</h1>

    <textarea id="inputText" placeholder="Enter text here..."></textarea>
    <button id="runButton">Run Clarity</button>

    <h2>Improved Text</h2>
    <pre id="improvedText"></pre>

    <h2>Sections</h2>
    <pre id="sections"></pre>

    <h2>Trace</h2>
    <pre id="trace"></pre>

    <h2>Quality</h2>
    <pre id="quality"></pre>

    <script src="script.js"></script>
</body>
</html>
