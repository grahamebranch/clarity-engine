<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Engine UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app-container">

        <h1>Clarity Engine</h1>

        <!-- Input Panel -->
        <div class="panel">
            <h2>Input</h2>
            <textarea id="inputText" placeholder="Enter text here..."></textarea>
            <button id="runButton">Run Engine</button>
        </div>

        <!-- Output Panel -->
        <div class="panel">
            <h2>Output</h2>
            <pre id="improvedText"></pre>
        </div>

        <!-- Sections Panel -->
        <div class="panel">
            <h2>Sections</h2>
            <pre id="sections"></pre>
        </div>

        <!-- Trace Panel -->
        <div class="panel">
            <h2>Trace</h2>
            <pre id="trace"></pre>
        </div>

        <!-- Quality Panel -->
        <div class="panel">
            <h2>Quality</h2>
            <pre id="quality"></pre>
        </div>

        <!-- ⭐ Diagnostics Panel (EL10) -->
        <div id="diagnostics-panel" class="panel">
            <h2>Diagnostics</h2>
            <pre id="diagnostics-output"></pre>
        </div>

    </div>

    <script src="./ui.js"></script>
</body>
</html>
